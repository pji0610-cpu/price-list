<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>가격표</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.css" />
  </head>
  <body>
    <div id="stlite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          // 💡 pandas를 제거하여 로딩 속도를 비약적으로 높였습니다.
          requirements: [], 
          entrypoint: "streamlit_app.py",
          files: {
            "streamlit_app.py": `
import streamlit as st

st.set_page_config(page_title="가격표", layout="centered")
st.title("📱 우리집 가격표")

# 💡 데이터 리스트 (여기에 가격 정보를 넣으세요)
raw_data = [
    {"품목명": "신라면", "가격": 1200},
    {"품목명": "진라면", "가격": 1100},
    {"품목명": "참치캔", "가격": 2500},
    {"품목명": "햇반", "가격": 1800},
    {"품목명": "코카콜라", "가격": 2000},
]

query = st.text_input("🔍 품목명 검색", placeholder="검색어를 입력하세요")

if query:
    # Pandas 없이 기본 파이썬으로 검색 기능 구현
    res = [item for item in raw_data if query in item['품목명']]
    
    if res:
        for item in res:
            st.info(f"**{item['품목명']}**")
            st.subheader(f"{item['가격']:,} 원")
            st.divider()
    else:
        st.error("결과가 없습니다.")
else:
    st.write("---")
    # 표 대신 깔끔한 리스트로 전체 출력
    for item in raw_data:
        st.text(f"{item['품목명']}: {item['가격']:,}원")
`,
          },
        },
        document.getElementById("stlite")
      );
    </script>
  </body>
</html>
