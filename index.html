<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 가격표 - 실시간 연동</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 22px; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #007bff; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .item-card { border-bottom: 1px solid #eee; padding: 12px 5px; }
        .item-name { font-weight: bold; font-size: 17px; }
        .item-price { font-size: 19px; font-weight: bold; color: #007bff; margin-top: 4px; }
        .loading { text-align: center; color: #666; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📱 실시간 가격표</h1>
    <input type="text" id="searchInput" oninput="renderItems()" placeholder="품목명을 검색하세요...">
    <div id="itemList"><div class="loading">데이터를 불러오는 중...</div></div>
</div>

<script>
    // 💡 아래의 '여기에_복사한_시트_ID를_넣으세요' 부분을 실제 ID로 교체하세요.
    const sheetId = '1BZCr9Y2uX2WiDGOQMXJKVN12PKkKt2CMFgMXzN9C4mw/edit?gid=0#gid=0';
    const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    let priceData = [];

    // 구글 시트 데이터 가져오기
    async function fetchSheetData() {
        try {
            const response = await fetch(base);
            const data = await response.text();
            
            // CSV 데이터를 배열로 변환 (간이 파싱)
            const rows = data.split('\n').slice(1); // 첫 줄 제외
            priceData = rows.map(row => {
                const cols = row.split('","').map(col => col.replace(/"/g, ''));
                return { name: cols[0], price: parseInt(cols[1]) || 0 };
            }).filter(item => item.name); // 빈 줄 제거

            renderItems();
        } catch (error) {
            document.getElementById('itemList').innerHTML = "데이터를 불러오지 못했습니다. 설정을 확인해 주세요.";
        }
    }

    function renderItems() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const itemList = document.getElementById('itemList');
        
        const filtered = priceData.filter(item => item.name.toLowerCase().includes(query));
        
        itemList.innerHTML = filtered.map(item => `
            <div class="item-card">
                <div class="item-name">${item.name}</div>
                <div class="item-price">${item.price.toLocaleString()} 원</div>
            </div>
        `).join('');
    }

    fetchSheetData();
</script>

</body>
</html>
