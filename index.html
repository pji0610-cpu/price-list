<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 가격표</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 24px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .item-card { border-bottom: 1px solid #eee; padding: 15px 0; }
        .item-name { font-weight: bold; font-size: 18px; color: #007bff; }
        .item-price { font-size: 20px; font-weight: bold; margin-top: 5px; }
        .no-result { text-align: center; color: red; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📱 우리집 가격표</h1>
    <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="품목명을 검색하세요 (예: 라면)">
    
    <div id="itemList">
        <div class="item-card" data-name="신라면">
            <div class="item-name">신라면</div>
            <div class="item-price">1,200 원</div>
        </div>
        <div class="item-card" data-name="진라면">
            <div class="item-name">진라면</div>
            <div class="item-price">1,100 원</div>
        </div>
        <div class="item-card" data-name="참치캔">
            <div class="item-name">참치캔</div>
            <div class="item-price">2,500 원</div>
        </div>
        <div class="item-card" data-name="햇반">
            <div class="item-name">햇반</div>
            <div class="item-price">1,800 원</div>
        </div>
    </div>
    <div id="noResult" class="no-result">검색 결과가 없습니다.</div>
</div>

<script>
    function filterItems() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('item-card');
        const noResult = document.getElementById('noResult');
        let hasVisible = false;

        for (let i = 0; i < cards.length; i++) {
            const name = cards[i].getAttribute('data-name').toLowerCase();
            if (name.includes(input)) {
                cards[i].style.display = "";
                hasVisible = true;
            } else {
                cards[i].style.display = "none";
            }
        }
        noResult.style.display = hasVisible ? "none" : "block";
    }
</script>

</body>
</html>
