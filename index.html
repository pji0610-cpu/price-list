<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가격표 - 관리자모드</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f2f5; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        #searchInput { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .item-card { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; }
        .item-name { font-weight: bold; font-size: 17px; }
        .item-price { color: #1a73e8; font-weight: bold; font-size: 18px; margin-top: 5px; }
        .edit-btn { background: #e8f0fe; color: #1a73e8; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .save-btn { background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📱 가격표 관리자</h1>
    <input type="text" id="searchInput" oninput="renderItems()" placeholder="검색 또는 가격 수정...">
    <div id="itemList"></div>
    <button class="save-btn" onclick="saveToDevice()">데이터 영구 저장 (내 폰에만)</button>
</div>

<script>
    // 💡 초기 기본 데이터 (저장된 데이터가 없으면 실행됨)
    let priceData = JSON.parse(localStorage.getItem('myPriceData')) || [
        { name: "신라면", price: 1200 },
        { name: "진라면", price: 1100 },
        { name: "참치캔", price: 2500 }
    ];

    function renderItems() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const itemList = document.getElementById('itemList');
        
        const filtered = priceData.filter(item => item.name.toLowerCase().includes(query));
        
        itemList.innerHTML = filtered.map((item, index) => `
            <div class="item-card">
                <div class="item-info">
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${item.price.toLocaleString()} 원</div>
                </div>
                <button class="edit-btn" onclick="editPrice('${item.name}')">금액수정</button>
            </div>
        `).join('');
    }

    // 💡 금액 수정 기능
    function editPrice(name) {
        const newPrice = prompt(`${name}의 새로운 가격을 입력하세요 (숫자만)`, "");
        if (newPrice !== null && !isNaN(newPrice) && newPrice !== "") {
            const index = priceData.findIndex(item => item.name === name);
            priceData[index].price = parseInt(newPrice);
            renderItems();
            saveToDevice(); // 수정 즉시 저장
        }
    }

    // 💡 기기에 데이터 저장
    function saveToDevice() {
        localStorage.setItem('myPriceData', JSON.stringify(priceData));
        alert("수정된 가격이 내 폰에 저장되었습니다!");
    }

    renderItems();
</script>

</body>
</html>
